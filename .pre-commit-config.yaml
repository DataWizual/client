# =================================================================
# Sentinel Core — Pre-commit Security Gate
# Блокирует коммит при обнаружении критических уязвимостей.
# =================================================================
# Установка:
#   1. pip install pre-commit
#   2. pre-commit install
#   Или автоматически: sentinel init
# =================================================================

repos:
  - repo: local
    hooks:
      - id: sentinel-scan
        name: "🛡️ Sentinel Security Gate"
        entry: sentinel scan .
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
        verbose: true

# Для генерации HTML отчёта при каждом коммите (опционально, медленнее):
# замените entry на: sentinel scan . --report
#
# Для полного AI-анализа через Auditor Core (медленнее, рекомендуется для PR):
# замените entry на: sentinel scan . --audit --report