# Auditor Core — внутренний конфиг для работы внутри Sentinel
# Используется AuditorRunner при запуске через Bridge

scanner:
  offline_mode: false
  baseline_file: "baseline.json"
  max_file_size_kb: 500
  exclude_patterns:
    - "*.min.js"
    - "*.lock"
    - "node_modules/*"
    - "venv/*"
    - ".git/*"
    - "__pycache__/*"

detectors:
  bandit_detector: true
  semgrep_detector: true
  gitleaks_detector: true
  secret_detector: true
  dependency_scanner: true
  iac_scanner: true
  cicd_analyzer: true
  sast_scanner: true
  slither_detector: false   # Web3 только по требованию
  license_scanner: false    # Не нужен в sentinel режиме

ai:
  enabled: true
  provider: "google"
  model: "gemini-2.5-flash"
  max_findings_per_scan: 15  # Ограничиваем для скорости при коммите
  min_severity_for_ai: "HIGH" # В sentinel режиме только HIGH/CRITICAL
  batch_size: 3
  sleep_between_batches: 20

reporting:
  output_dir: "reports"

policy:
  fail_on_severity: "HIGH"
  min_severity_for_ai: "HIGH"