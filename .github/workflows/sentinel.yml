name: Sentinel Security Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        # v4.2.2 - Official GitHub Action pinned to SHA for supply-chain security
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Sentinel
        env:
          INSTALL_TOKEN: ${{ secrets.SENTINEL_INSTALL_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          pip install git+https://x-access-token:${INSTALL_TOKEN}@github.com/DataWizual/sentinel-cicd.git@main
      
      - name: Execute Security Scan
        id: scan_step
        env:
          SENTINEL_AUTHORIZED_REPO: ${{ github.repository }}
        run: sentinel scan . --report
        continue-on-error: true

      - name: Upload Security Report
        if: steps.scan_step.outcome == 'failure'
        # v4.6.0 - Official GitHub Action pinned to SHA for supply-chain security
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: sentinel-security-report
          path: sentinel_report.html
          retention-days: 7

      - name: Report Violations
        if: steps.scan_step.outcome == 'failure'
        # v7.0.1 - Official GitHub Action pinned to SHA for supply-chain security
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          github-token: ${{ secrets.SENTINEL_ALERT_TOKEN }} 
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Sentinel: Security Violation Detected',
              body: 'Sentinel found policy violations. Check GitHub Action logs for a detailed security audit.'
            })

      - name: Terminate on Failure
        if: steps.scan_step.outcome == 'failure'
        run: exit 1